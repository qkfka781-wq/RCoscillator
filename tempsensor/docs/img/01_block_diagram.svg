<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#fafafa" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">RC Oscillator + 온도 센서 전체 구조</text>

  <!-- Main RC OSC -->
  <rect x="40" y="60" width="220" height="120" rx="8" fill="#e8f4fd" stroke="#4a9eff" stroke-width="2"/>
  <text x="150" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">Main RC Network</text>
  <text x="150" y="115" text-anchor="middle" font-size="11" fill="#555">3-stage Distributed RC</text>
  <text x="150" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">→ CLK_OSC</text>

  <!-- Delay Line -->
  <rect x="310" y="60" width="260" height="120" rx="8" fill="#fff3e0" stroke="#f39c12" stroke-width="2"/>
  <text x="440" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">Delay Line (60 stages)</text>
  <rect x="325" y="98" width="105" height="30" rx="4" fill="#4a9eff" opacity="0.15" stroke="#4a9eff"/>
  <text x="377" y="118" text-anchor="middle" font-size="10" fill="#2980b9">D[0]~D[29] Cal SAR</text>
  <rect x="440" y="98" width="115" height="30" rx="4" fill="#e74c3c" opacity="0.12" stroke="#e74c3c"/>
  <text x="497" y="118" text-anchor="middle" font-size="10" fill="#c0392b">D[30]~D[59] Temp SAR</text>
  <text x="440" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">D[30] → temp_en</text>

  <!-- Temp RC Network -->
  <rect x="620" y="60" width="240" height="120" rx="8" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="740" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Temp RC Network</text>
  <text x="740" y="110" text-anchor="middle" font-size="11" fill="#555">VDD → R1 → R2 → R3</text>
  <text x="740" y="130" text-anchor="middle" font-size="11" fill="#555">매 phase 0V 리셋 후 충전</text>
  <text x="740" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b"> </text>

  <!-- Cal SAR -->
  <rect x="40" y="240" width="220" height="90" rx="8" fill="#e8f8f0" stroke="#27ae60" stroke-width="2"/>
  <text x="150" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Cal SAR + DLF</text>
  <text x="150" y="290" text-anchor="middle" font-size="11" fill="#555">주파수 calibration</text>
  <text x="150" y="308" text-anchor="middle" font-size="11" fill="#555">→ oref 보정</text>

  <!-- Temp SAR -->
  <rect x="620" y="240" width="240" height="90" rx="8" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="740" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Temp SAR ADC</text>
  <text x="740" y="295" text-anchor="middle" font-size="11" fill="#555"> </text>

  <!-- Arrows -->
  <line x1="260" y1="120" x2="310" y2="120" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="285" y="112" text-anchor="middle" font-size="9" fill="#4a9eff">CLK_OSC</text>

  <path d="M377 180 L377 210 L150 210 L150 240" fill="none" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="206" text-anchor="middle" font-size="9" fill="#4a9eff">CKR_ASYN</text>

  <path d="M497 180 L497 210 L740 210 L740 240" fill="none" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="206" text-anchor="middle" font-size="9" fill="#c0392b">CKR_ASYN_TMP</text>

  <path d="M740 180 L740 195 L680 195 L680 285 L620 285" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="640" y="230" font-size="9" fill="#c0392b">RC → SAR</text>

  <path d="M860 285 L880 285 L880 48 L740 48 L740 60" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="40" font-size="10" font-weight="bold" fill="#e74c3c">SAR 완료 → 리셋</text>

  <!-- Legend -->
  <rect x="40" y="355" width="820" height="50" rx="8" fill="#f8f9fa" stroke="#dee2e6"/>
  <circle cx="65" cy="380" r="10" fill="#4a9eff"/>
  <text x="65" y="384" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">1</text>
  <text x="83" y="384" font-size="10" fill="#555">RC 충전 시작</text>
  <circle cx="225" cy="380" r="10" fill="#27ae60"/>
  <text x="225" y="384" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">2</text>
  <text x="243" y="384" font-size="10" fill="#555">Cal SAR (30 stages)</text>
  <circle cx="430" cy="380" r="10" fill="#e74c3c"/>
  <text x="430" y="384" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">3</text>
  <text x="448" y="384" font-size="10" fill="#555">hold → Temp SAR (30 stages)</text>
  <circle cx="670" cy="380" r="10" fill="#8e44ad"/>
  <text x="670" y="384" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">4</text>
  <text x="688" y="384" font-size="10" fill="#555">리셋(0V) → 다음 phase 반복</text>
</svg>