  <!-- Summary boxes -->
  <rect x="40" y="300" width="260" height="55" rx="8" fill="#e8f4fd" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="170" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">CLK_OSC 반주기</text>
  <text x="170" y="342" text-anchor="middle" font-size="12" fill="#333">2.016 → 2.119 μs (+5%)</text>

  <rect x="320" y="300" width="260" height="55" rx="8" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="450" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Gate delay</text>
