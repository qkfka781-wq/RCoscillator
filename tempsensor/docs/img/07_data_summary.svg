  <!-- Bottom note -->
  <rect x="40" y="375" width="820" height="35" rx="8" fill="#fff3e0" stroke="#f39c12"/>
  <text x="450" y="397" text-anchor="middle" font-size="12" fill="#333">T ↑ → gate delay ↓ → SAR 빨리 끝남 → idle 늘어남 → 충전 시간 ↑ → 전압 ↑ → ADC 코드 ↑</text>
</svg>