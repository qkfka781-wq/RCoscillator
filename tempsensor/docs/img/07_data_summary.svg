  <rect x="600" y="300" width="260" height="55" rx="8" fill="#e8f8f0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="730" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">ADC 감도</text>
