  <text x="330" y="170" text-anchor="middle" font-size="11" fill="#333">2.075 μs</text>
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="#333">82.8M (12.1ns) / 76.0M (13.2ns)</text>
