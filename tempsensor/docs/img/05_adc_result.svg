<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, sans-serif">
  <rect width="900" height="480" fill="#fafafa" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">온도별 ADC 코드 (12-bit)</text>

  <!-- Chart area -->
  <rect x="100" y="50" width="700" height="340" fill="#fff" stroke="#dee2e6" rx="4"/>

  <!-- Y axis -->
  <line x1="100" y1="50" x2="100" y2="390" stroke="#333" stroke-width="1.5"/>
  <text x="45" y="225" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,45,225)">ADC Code</text>

  <!-- Y axis labels (3400 ~ 4000) -->
  <text x="92" y="387" text-anchor="end" font-size="10" fill="#888">3400</text>
  <line x1="97" y1="383" x2="103" y2="383" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="383" x2="800" y2="383" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="330" text-anchor="end" font-size="10" fill="#888">3500</text>
  <line x1="97" y1="326" x2="103" y2="326" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="326" x2="800" y2="326" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="273" text-anchor="end" font-size="10" fill="#888">3600</text>
  <line x1="97" y1="269" x2="103" y2="269" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="269" x2="800" y2="269" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="216" text-anchor="end" font-size="10" fill="#888">3700</text>
  <line x1="97" y1="212" x2="103" y2="212" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="212" x2="800" y2="212" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="159" text-anchor="end" font-size="10" fill="#888">3800</text>
  <line x1="97" y1="155" x2="103" y2="155" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="155" x2="800" y2="155" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="102" text-anchor="end" font-size="10" fill="#888">3900</text>
  <line x1="97" y1="98" x2="103" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="103" y1="98" x2="800" y2="98" stroke="#eee" stroke-width="0.5"/>

  <text x="92" y="57" text-anchor="end" font-size="10" fill="#888">4000</text>
  <line x1="97" y1="53" x2="103" y2="53" stroke="#333" stroke-width="1"/>

  <!-- X axis -->
  <line x1="100" y1="390" x2="800" y2="390" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" font-size="13" fill="#555">Temperature (°C)</text>

  <!-- X positions: -30=150, 9=197, 30=222, 60=258, 90=294, 120=330 -->
  <!-- Scaled: x = 150 + (T+30) * 3.9 -->
  <!-- -30:150, 9:302, 30:384, 60:501, 90:618, 120:735 -->

  <!-- X axis labels -->
  <text x="150" y="407" text-anchor="middle" font-size="10" fill="#888">-30</text>
  <line x1="150" y1="387" x2="150" y2="393" stroke="#333" stroke-width="1"/>
  <text x="302" y="407" text-anchor="middle" font-size="10" fill="#888">9</text>
  <line x1="302" y1="387" x2="302" y2="393" stroke="#333" stroke-width="1"/>
  <text x="384" y="407" text-anchor="middle" font-size="10" fill="#888">30</text>
  <line x1="384" y1="387" x2="384" y2="393" stroke="#333" stroke-width="1"/>
  <text x="501" y="407" text-anchor="middle" font-size="10" fill="#888">60</text>
  <line x1="501" y1="387" x2="501" y2="393" stroke="#333" stroke-width="1"/>
  <text x="618" y="407" text-anchor="middle" font-size="10" fill="#888">90</text>
  <line x1="618" y1="387" x2="618" y2="393" stroke="#333" stroke-width="1"/>
  <text x="735" y="407" text-anchor="middle" font-size="10" fill="#888">120</text>
  <line x1="735" y1="387" x2="735" y2="393" stroke="#333" stroke-width="1"/>

  <!-- Y scale: 1 code = (390-53)/(4000-3400) = 0.5617 px/code -->
  <!-- y = 390 - (code - 3400) * 0.5617 -->
  <!-- Phase A: 3583→y=287, 3583→287, 3736→201, 3789→171, 3851→136, 3927→93 -->
  <!-- Phase B: 3456→y=358, 3472→349, 3682→232, 3767→184, 3843→141, 3925→94 -->

  <!-- Phase A line + dots (blue) -->
  <polyline points="150,287 302,287 384,201 501,171 618,136 735,93" fill="none" stroke="#4a9eff" stroke-width="2.5"/>
  <circle cx="150" cy="287" r="6" fill="#4a9eff"/>
  <circle cx="302" cy="287" r="6" fill="#4a9eff"/>
  <circle cx="384" cy="201" r="6" fill="#4a9eff"/>
  <circle cx="501" cy="171" r="6" fill="#4a9eff"/>
  <circle cx="618" cy="136" r="6" fill="#4a9eff"/>
  <circle cx="735" cy="93" r="6" fill="#4a9eff"/>

  <!-- Phase A labels -->
  <text x="150" y="278" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3583</text>
  <text x="302" y="278" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3583</text>
  <text x="384" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3736</text>
  <text x="501" y="162" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3789</text>
  <text x="618" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3851</text>
  <text x="735" y="84" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a9eff">3927</text>

  <!-- Phase B line + dots (red) -->
  <polyline points="150,358 302,349 384,232 501,184 618,141 735,94" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <circle cx="150" cy="358" r="6" fill="#e74c3c"/>
  <circle cx="302" cy="349" r="6" fill="#e74c3c"/>
  <circle cx="384" cy="232" r="6" fill="#e74c3c"/>
  <circle cx="501" cy="184" r="6" fill="#e74c3c"/>
  <circle cx="618" cy="141" r="6" fill="#e74c3c"/>
  <circle cx="735" cy="94" r="6" fill="#e74c3c"/>

  <!-- Phase B labels -->
  <text x="150" y="374" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3456</text>
  <text x="302" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3472</text>
  <text x="384" y="248" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3682</text>
  <text x="501" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3767</text>
  <text x="618" y="157" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3843</text>
  <text x="735" y="110" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">3925</text>

  <!-- Legend -->
  <rect x="570" y="55" width="220" height="55" rx="6" fill="#fff" stroke="#dee2e6"/>
  <line x1="585" y1="72" x2="615" y2="72" stroke="#4a9eff" stroke-width="2.5"/>
  <circle cx="600" cy="72" r="4" fill="#4a9eff"/>
  <text x="625" y="76" font-size="11" fill="#333">Phase A</text>
  <line x1="585" y1="95" x2="615" y2="95" stroke="#e74c3c" stroke-width="2.5"/>
  <circle cx="600" cy="95" r="4" fill="#e74c3c"/>
  <text x="625" y="99" font-size="11" fill="#333">Phase B</text>

  <!-- Summary -->
  <rect x="100" y="420" width="700" height="45" rx="8" fill="#f8f9fa" stroke="#dee2e6"/>
  <text x="450" y="440" text-anchor="middle" font-size="12" fill="#333">감도: ~2.7 LSB/°C | Range: 3456 ~ 3927 (471 codes / 150°C) | 단조 증가 ✅</text>
  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#888"> </text>
</svg>